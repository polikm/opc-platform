# ============================================================
# OPC智能体平台 - 生产环境 Docker Compose 覆盖配置
# ============================================================
# 使用方法:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

version: "3.8"

services:
  # PostgreSQL 生产配置
  postgres:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 2G
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=1GB
      -c effective_cache_size=3GB
      -c work_mem=16MB
      -c maintenance_work_mem=256MB
      -c wal_buffers=16MB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c min_wal_size=1GB
      -c max_wal_size=4GB
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # Redis 生产配置
  redis:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 768mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --tcp-backlog 511
      --timeout 300
      --tcp-keepalive 60
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # MinIO 生产配置
  minio:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # API 网关生产配置
  api-gateway:
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    environment:
      NODE_ENV: production
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"

  # AI 服务生产配置
  ai-service:
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    environment:
      NODE_ENV: production
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"

  # Web 前端生产配置
  web:
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    environment:
      NODE_ENV: production
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # Dify API 生产配置
  dify-api:
    restart: always
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    environment:
      LOG_LEVEL: WARNING
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"

  # Dify Worker 生产配置
  dify-worker:
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    environment:
      LOG_LEVEL: WARNING
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"

  # Dify DB 生产配置
  dify-db:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=512MB
      -c effective_cache_size=1536MB
      -c work_mem=8MB
      -c maintenance_work_mem=128MB
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # Dify Redis 生产配置
  dify-redis:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    command: >
      redis-server
      --requirepass ${DIFY_REDIS_PASSWORD}
      --maxmemory 384mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # Nginx 生产配置
  nginx:
    restart: always
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"
