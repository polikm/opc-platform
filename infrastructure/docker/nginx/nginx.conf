# ============================================================
# OPC智能体平台 - Nginx 反向代理配置
# ============================================================

# 工作进程数
worker_processes auto;

# 错误日志
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

# 事件配置
events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

# HTTP 配置块
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream_addr=$upstream_addr upstream_status=$upstream_status '
                    'request_time=$request_time';

    access_log /var/log/nginx/access.log main;

    # 基础优化
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 100m;
    client_body_buffer_size 10m;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 300s;

    # Gzip 压缩配置
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/opentype
        font/ttf
        font/woff
        font/woff2;

    # ============================================================
    # 上游服务定义
    # ============================================================

    # OPC Web 前端
    upstream web_upstream {
        server web:3001;
        keepalive 32;
    }

    # OPC API 网关
    upstream api_gateway_upstream {
        server api-gateway:3000;
        keepalive 32;
    }

    # OPC AI 服务
    upstream ai_service_upstream {
        server ai-service:8000;
        keepalive 32;
    }

    # Dify Web 前端
    upstream dify_web_upstream {
        server dify-web:3000;
        keepalive 32;
    }

    # Dify API 服务
    upstream dify_api_upstream {
        server dify-api:5001;
        keepalive 32;
    }

    # ============================================================
    # HTTP 服务器配置
    # ============================================================
    server {
        listen 80;
        server_name localhost;

        # 安全头配置
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' ws: wss: http: https:;" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ============================================================
        # 路由规则
        # ============================================================

        # 根路径 -> OPC Web 前端
        location / {
            proxy_pass http://web_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # /api/ -> OPC API 网关
        location /api/ {
            proxy_pass http://api_gateway_upstream/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # API 超时配置（长时间请求支持）
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # /ai/ -> OPC AI 服务
        location /ai/ {
            proxy_pass http://ai_service_upstream/ai/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # /ai/chat 流式接口 - WebSocket 支持
        location /ai/chat {
            proxy_pass http://ai_service_upstream/ai/chat;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 流式响应超时配置
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_buffering off;
            proxy_cache off;
        }

        # /dify/ -> Dify Web 前端
        location /dify/ {
            proxy_pass http://dify_web_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # /dify-api/ -> Dify API 服务（用于OPC平台与Dify集成）
        location /dify-api/ {
            proxy_pass http://dify_api_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Dify API 可能需要较长的超时时间
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # /dify-api/v1/files/ -> Dify 文件服务（需要流式传输支持）
        location /dify-api/v1/files/ {
            proxy_pass http://dify_api_upstream/v1/files/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # 大文件传输支持
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # 健康检查端点
        location /nginx-health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # 禁止访问隐藏文件
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
