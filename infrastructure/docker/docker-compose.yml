# ============================================================
# OPC智能体平台 - 本地开发环境 Docker Compose 配置
# ============================================================
# 使用方法:
#   cp .env.example .env          # 复制环境变量配置
#   docker compose up -d          # 启动所有服务
#   docker compose logs -f        # 查看日志
#   docker compose down -v        # 停止并清除数据卷
# ============================================================

version: "3.8"

services:
  # ============================================================
  # 基础设施服务
  # ============================================================

  # PostgreSQL 16 + pgvector 主数据库
  postgres:
    image: pgvector/pgvector:pg16
    container_name: opc-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-opc_platform}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-opc_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - opc-network

  # Redis 7 缓存服务
  redis:
    image: redis:7-alpine
    container_name: opc-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis123}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opc-network

  # MinIO 对象存储服务
  minio:
    image: minio/minio:latest
    container_name: opc-minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - opc-network

  # MinIO 初始化 - 自动创建 bucket
  minio-init:
    image: minio/mc:latest
    container_name: opc-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123};
      mc mb --ignore-existing myminio/${MINIO_BUCKET:-opc-uploads};
      mc anonymous set download myminio/${MINIO_BUCKET:-opc-uploads};
      echo 'MinIO bucket 初始化完成';
      exit 0;
      "
    networks:
      - opc-network

  # ============================================================
  # OPC 业务服务
  # ============================================================

  # API 网关 - NestJS 后端
  api-gateway:
    build:
      context: ../..
      dockerfile: apps/api-gateway/Dockerfile
    container_name: opc-api-gateway
    restart: unless-stopped
    ports:
      - "${API_GATEWAY_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      # 数据库配置
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DATABASE_NAME: ${POSTGRES_DB:-opc_platform}
      # Redis配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      # JWT配置
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      # MinIO配置
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-opc-uploads}
      MINIO_USE_SSL: "false"
      # CORS配置
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
      # Swagger配置
      SWAGGER_TITLE: ${SWAGGER_TITLE:-OPC智能体系统 API}
      SWAGGER_DESCRIPTION: ${SWAGGER_DESCRIPTION:-OPC智能体系统业务API网关文档}
      SWAGGER_VERSION: ${SWAGGER_VERSION:-1.0}
      # 限流配置
      THROTTLE_TTL: ${THROTTLE_TTL:-60}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-100}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../apps/api-gateway:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - opc-network

  # AI 服务 - FastAPI
  ai-service:
    build:
      context: ../..
      dockerfile: apps/ai-service/Dockerfile
    container_name: opc-ai-service
    restart: unless-stopped
    ports:
      - "${AI_SERVICE_PORT:-8000}:8000"
    environment:
      # 数据库配置
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DATABASE_NAME: ${POSTGRES_DB:-opc_platform}
      # Redis配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      # AI模型配置
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      # Dify配置
      DIFY_API_URL: http://dify-api:5001
      DIFY_API_KEY: ${DIFY_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../apps/ai-service:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - opc-network

  # Web 前端 - Next.js
  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: opc-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3001}:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      NEXT_PUBLIC_AI_URL: ${NEXT_PUBLIC_AI_URL:-http://localhost:8000}
      NEXT_PUBLIC_DIFY_URL: ${NEXT_PUBLIC_DIFY_URL:-http://localhost:3002}
    depends_on:
      - api-gateway
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3001 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - opc-network

  # ============================================================
  # Dify AI 平台服务
  # 参考官方 docker-compose.yaml 标准配置
  # ============================================================

  # Dify 专用 PostgreSQL（与主数据库分离）
  dify-db:
    image: postgres:15-alpine
    container_name: opc-dify-db
    restart: unless-stopped
    environment:
      PGUSER: postgres
      POSTGRES_PASSWORD: ${DIFY_DB_PASSWORD:-difyai123456}
      POSTGRES_DB: ${DIFY_DB_DATABASE:-dify}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - dify_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-U", "postgres", "-d", "${DIFY_DB_DATABASE:-dify}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - opc-network

  # Dify 专用 Redis（与主Redis分离）
  dify-redis:
    image: redis:6-alpine
    container_name: opc-dify-redis
    restart: unless-stopped
    volumes:
      - dify_redis_data:/data
    command: redis-server --requirepass ${DIFY_REDIS_PASSWORD:-difyai123456}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${DIFY_REDIS_PASSWORD:-difyai123456} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opc-network

  # Dify API 服务
  dify-api:
    image: langgenius/dify-api:latest
    container_name: opc-dify-api
    restart: unless-stopped
    ports:
      - "${DIFY_API_PORT:-5001}:5001"
    environment:
      # 启动模式
      MODE: api
      LOG_LEVEL: INFO
      # 安全密钥（生产环境请使用 openssl rand -base64 42 生成）
      SECRET_KEY: ${DIFY_SECRET_KEY:-sk-opc-dify-dev-secret-key-change-me}
      # 控制台和API URL
      CONSOLE_WEB_URL: ${DIFY_CONSOLE_WEB_URL:-}
      CONSOLE_API_URL: ${DIFY_CONSOLE_API_URL:-}
      SERVICE_API_URL: ${DIFY_SERVICE_API_URL:-}
      APP_WEB_URL: ${DIFY_APP_WEB_URL:-}
      # 文件配置
      FILES_URL: ${DIFY_FILES_URL:-}
      FILES_ACCESS_TIMEOUT: 300
      # 数据库迁移
      MIGRATION_ENABLED: "true"
      # 数据库配置（连接Dify专用PostgreSQL）
      DB_USERNAME: postgres
      DB_PASSWORD: ${DIFY_DB_PASSWORD:-difyai123456}
      DB_HOST: dify-db
      DB_PORT: 5432
      DB_DATABASE: ${DIFY_DB_DATABASE:-dify}
      # Redis配置（连接Dify专用Redis）
      REDIS_HOST: dify-redis
      REDIS_PORT: 6379
      REDIS_USERNAME: ""
      REDIS_PASSWORD: ${DIFY_REDIS_PASSWORD:-difyai123456}
      REDIS_USE_SSL: "false"
      REDIS_DB: 0
      # Celery Broker配置
      CELERY_BROKER_URL: redis://:${DIFY_REDIS_PASSWORD:-difyai123456}@dify-redis:6379/1
      # CORS配置
      WEB_API_CORS_ALLOW_ORIGINS: "*"
      CONSOLE_CORS_ALLOW_ORIGINS: "*"
      # 存储配置
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: storage
      # 向量数据库配置（使用pgvector）
      VECTOR_STORE: pgvector
      PGVECTOR_HOST: dify-db
      PGVECTOR_PORT: 5432
      PGVECTOR_USER: postgres
      PGVECTOR_PASSWORD: ${DIFY_DB_PASSWORD:-difyai123456}
      PGVECTOR_DATABASE: ${DIFY_DB_DATABASE:-dify}
      # 代码沙箱配置
      CODE_EXECUTION_ENDPOINT: "http://dify-sandbox:8194"
      CODE_EXECUTION_API_KEY: ${DIFY_SANDBOX_API_KEY:-dify-sandbox}
      CODE_MAX_NUMBER: 9223372036854775807
      CODE_MIN_NUMBER: -9223372036854775808
      CODE_MAX_STRING_LENGTH: 80000
      TEMPLATE_TRANSFORM_MAX_LENGTH: 80000
      CODE_MAX_STRING_ARRAY_LENGTH: 30
      CODE_MAX_OBJECT_ARRAY_LENGTH: 30
      CODE_MAX_NUMBER_ARRAY_LENGTH: 1000
      # SSRF代理配置
      SSRF_PROXY_HTTP_URL: "http://dify-ssrf-proxy:3128"
      SSRF_PROXY_HTTPS_URL: "http://dify-ssrf-proxy:3128"
      # 索引配置
      INDEXING_MAX_SEGMENTATION_TOKENS_LENGTH: 1000
      # 邮件配置（可选）
      MAIL_TYPE: ""
      MAIL_DEFAULT_SEND_FROM: ""
      SMTP_SERVER: ""
      SMTP_PORT: 465
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
    depends_on:
      dify-db:
        condition: service_healthy
      dify-redis:
        condition: service_healthy
    volumes:
      - dify_app_storage:/app/api/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - opc-network
      - dify-ssrf-network

  # Dify Worker 服务（Celery异步任务处理）
  dify-worker:
    image: langgenius/dify-api:latest
    container_name: opc-dify-worker
    restart: unless-stopped
    environment:
      # Worker模式
      MODE: worker
      LOG_LEVEL: INFO
      SECRET_KEY: ${DIFY_SECRET_KEY:-sk-opc-dify-dev-secret-key-change-me}
      CONSOLE_WEB_URL: ${DIFY_CONSOLE_WEB_URL:-}
      # 数据库配置
      DB_USERNAME: postgres
      DB_PASSWORD: ${DIFY_DB_PASSWORD:-difyai123456}
      DB_HOST: dify-db
      DB_PORT: 5432
      DB_DATABASE: ${DIFY_DB_DATABASE:-dify}
      # Redis配置
      REDIS_HOST: dify-redis
      REDIS_PORT: 6379
      REDIS_USERNAME: ""
      REDIS_PASSWORD: ${DIFY_REDIS_PASSWORD:-difyai123456}
      REDIS_DB: 0
      REDIS_USE_SSL: "false"
      CELERY_BROKER_URL: redis://:${DIFY_REDIS_PASSWORD:-difyai123456}@dify-redis:6379/1
      # 存储配置
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: storage
      # 向量数据库配置
      VECTOR_STORE: pgvector
      PGVECTOR_HOST: dify-db
      PGVECTOR_PORT: 5432
      PGVECTOR_USER: postgres
      PGVECTOR_PASSWORD: ${DIFY_DB_PASSWORD:-difyai123456}
      PGVECTOR_DATABASE: ${DIFY_DB_DATABASE:-dify}
      # 邮件配置
      MAIL_TYPE: ""
      MAIL_DEFAULT_SEND_FROM: ""
      SMTP_SERVER: ""
      SMTP_PORT: 465
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
      # 索引配置
      INDEXING_MAX_SEGMENTATION_TOKENS_LENGTH: 1000
    depends_on:
      dify-db:
        condition: service_healthy
      dify-redis:
        condition: service_healthy
    volumes:
      - dify_app_storage:/app/api/storage
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping --timeout 10 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    networks:
      - opc-network
      - dify-ssrf-network

  # Dify Web 前端
  dify-web:
    image: langgenius/dify-web:latest
    container_name: opc-dify-web
    restart: unless-stopped
    ports:
      - "${DIFY_WEB_PORT:-3002}:3000"
    environment:
      CONSOLE_API_URL: ${DIFY_CONSOLE_API_URL:-}
      APP_API_URL: ${DIFY_APP_API_URL:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - opc-network

  # Dify SSRF 代理（安全防护）
  dify-ssrf-proxy:
    image: ubuntu/squid:latest
    container_name: opc-dify-ssrf-proxy
    restart: unless-stopped
    volumes:
      - ./ssrf_proxy/squid.conf.template:/etc/squid/squid.conf.template:ro
      - ./ssrf_proxy/docker-entrypoint.sh:/docker-entrypoint-mount.sh:ro
    entrypoint:
      [
        "sh",
        "-c",
        "cp /docker-entrypoint-mount.sh /docker-entrypoint.sh && sed -i 's/\r$$//' /docker-entrypoint.sh && chmod +x /docker-entrypoint.sh && /docker-entrypoint.sh",
      ]
    environment:
      HTTP_PORT: 3128
      COREDUMP_DIR: /var/spool/squid
      REVERSE_PROXY_PORT: 8194
      SANDBOX_HOST: dify-sandbox
      SANDBOX_PORT: 8194
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3128 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - dify-ssrf-network
      - opc-network

  # Dify 代码沙箱
  dify-sandbox:
    image: langgenius/dify-sandbox:latest
    container_name: opc-dify-sandbox
    restart: unless-stopped
    environment:
      API_KEY: ${DIFY_SANDBOX_API_KEY:-dify-sandbox}
      GIN_MODE: release
      WORKER_TIMEOUT: 15
      ENABLE_NETWORK: "true"
      HTTP_PROXY: http://dify-ssrf-proxy:3128
      HTTPS_PROXY: http://dify-ssrf-proxy:3128
      SANDBOX_PORT: 8194
    volumes:
      - dify_sandbox_deps:/dependencies
      - dify_sandbox_conf:/conf
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8194/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - dify-ssrf-network

  # ============================================================
  # Nginx 反向代理
  # ============================================================

  nginx:
    image: nginx:alpine
    container_name: opc-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api-gateway
      - ai-service
      - web
      - dify-web
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - opc-network

# ============================================================
# 数据卷定义
# ============================================================

volumes:
  # 主数据库数据
  postgres_data:
    driver: local
  # 主Redis数据
  redis_data:
    driver: local
  # MinIO对象存储数据
  minio_data:
    driver: local
  # Dify数据库数据
  dify_db_data:
    driver: local
  # Dify Redis数据
  dify_redis_data:
    driver: local
  # Dify应用存储
  dify_app_storage:
    driver: local
  # Dify沙箱依赖
  dify_sandbox_deps:
    driver: local
  # Dify沙箱配置
  dify_sandbox_conf:
    driver: local
  # Nginx日志
  nginx_logs:
    driver: local

# ============================================================
# 网络定义
# ============================================================

networks:
  # OPC平台主网络
  opc-network:
    driver: bridge
  # Dify SSRF安全网络（内部网络，隔离沙箱访问）
  dify-ssrf-network:
    driver: bridge
    internal: true
